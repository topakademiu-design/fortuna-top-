<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TOP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: white;
            font-family: system-ui, sans-serif;
            min-height: 100vh;
        }
        .top-bar {
            background-color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .logo-small {
            width: 82px;
            height: 82px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
        }
        .logo-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .academy-text {
            color: black;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .box {
            max-width: 600px;
            width: 100%;
            padding: 30px 20px 40px;
            text-align: center;
            margin: 0 auto;
        }
        h2 {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        p {
            color: #555;
            margin-bottom: 24px;
        }
        .wheel-wrap {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 20px;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background: white;
        }
        .arrow {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            color: #222;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }
        button {
            background: #222;
            color: white;
            border: none;
            font-size: 20px;
            padding: 12px 40px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        button:active {
            background: #333;
            transform: scale(0.97);
        }
        #result {
            margin-top: 20px;
            font-size: 22px;
            min-height: 40px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo-small">
            <img src="logo.png" alt="Логотип">
        </div>
        <span class="academy-text">ACADEMY TOP</span>
    </div>

    <div class="box">
        <h2>ФОРТУНА TOP</h2>
        <p>нажми крутить — получи подарок!</p>
        <div class="wheel-wrap">
            <div class="arrow">▼</div>
            <canvas id="wheel" width="400" height="400"></canvas>
        </div>
        <button id="spin">Крутить</button>
        <div id="result">?</div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('result');
        const segments = [
            { color: '#e53e3e', label: '1' },
            { color: '#ffffff', label: '2' },
            { color: '#e53e3e', label: '3' },
            { color: '#ffffff', label: '4' },
            { color: '#e53e3e', label: '5' },
            { color: '#ffffff', label: '6' },
            { color: '#e53e3e', label: '7' },
            { color: '#ffffff', label: '8' }
        ];
        const count = segments.length;
        const angleStep = (Math.PI * 2) / count;
        let rotation = 0.2;
        let spinning = false;
        let speed = 0;
        let frame;

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            for (let i = 0; i < count; i++) {
                const start = i * angleStep + rotation;
                const end = start + angleStep;
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 198, start, end);
                ctx.closePath();
                ctx.fillStyle = segments[i].color;
                ctx.fill();
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(start + angleStep / 2);
                ctx.fillStyle = segments[i].color === '#ffffff' ? '#222' : '#fff';
                ctx.font = 'bold 28px Arial';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 6;
                ctx.fillText(segments[i].label, 110, 0);
                ctx.restore();
            }
            ctx.beginPath();
            ctx.arc(200, 200, 22, 0, 2 * Math.PI);
            ctx.fillStyle = '#eee';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function getIndex() {
            let raw = (3 * Math.PI / 2 - rotation) % (2 * Math.PI);
            if (raw < 0) raw += 2 * Math.PI;
            return Math.floor(raw / angleStep);
        }

        function updateResult() {
            const idx = getIndex();
            resultDiv.innerText = `Вы получили ${segments[idx].label}`;
        }

        function animate() {
            if (!spinning) return;
            speed *= 0.98;
            rotation += speed;
            draw();
            if (Math.abs(speed) < 0.003) {
                spinning = false;
                cancelAnimationFrame(frame);
                updateResult();
                return;
            }
            frame = requestAnimationFrame(animate);
        }

        draw();
        updateResult();

        document.getElementById('spin').addEventListener('click', () => {
            if (spinning) {
                speed += (Math.random() - 0.5) * 0.5;
            } else {
                speed = 0.6 + Math.random() * 0.6;
                if (Math.random() > 0.5) speed = -speed;
                spinning = true;
            }
            resultDiv.innerText = '···';
            animate();
        });
    </script>

</body>
</html>
